<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Text Editor</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;min-height:100vh}
  .header{background:linear-gradient(135deg,#16213e,#0f3460);padding:18px 30px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #e94560}
  .header h1{font-size:1.5rem;color:#e94560}
  .header p{color:#aaa;font-size:0.82rem;margin-top:2px}
  .container{display:flex;height:calc(100vh - 72px)}
  .sidebar{width:300px;background:#13132a;padding:18px;overflow-y:auto;border-right:1px solid #1e1e3a;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
  .main{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
  .upload-area{border:2px dashed #e94560;border-radius:12px;padding:30px 15px;text-align:center;cursor:pointer;transition:.3s}
  .upload-area:hover{background:#1a1a3a}
  .upload-area input{display:none}
  .btn{background:#e94560;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:.88rem;transition:.2s;width:100%}
  .btn:hover{background:#c73652}
  .btn:disabled{background:#444;cursor:not-allowed}
  .btn-outline{background:transparent;border:1px solid #e94560;color:#e94560}
  .btn-outline:hover{background:#1a1a3a}
  .status{padding:9px 13px;border-radius:8px;font-size:.82rem;display:none}
  .status.info{background:#0d2a4a;border:1px solid #4a90d9;color:#4a90d9}
  .status.success{background:#0a2a1a;border:1px solid #4caf50;color:#4caf50}
  .status.error{background:#2a0a0a;border:1px solid #e94560;color:#e94560}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:#666;margin-top:4px}
  .text-item{background:#1a1a3a;border:1.5px solid #2a2a5a;border-radius:8px;padding:10px 12px;cursor:pointer;transition:.2s}
  .text-item:hover{border-color:#e94560}
  .text-item.active{border-color:#e94560;background:#20203a}
  .text-item .label{font-size:.72rem;color:#888;margin-bottom:3px}
  .text-item .word{font-size:.92rem;font-weight:600}
  .text-item.done .word{color:#888;text-decoration:line-through}
  .edit-box{background:#1a1a3a;border-radius:10px;padding:14px;display:none}
  .edit-box h3{color:#e94560;font-size:.88rem;margin-bottom:10px}
  .edit-box input{width:100%;background:#0f0f1a;border:1px solid #e94560;color:#fff;padding:8px 11px;border-radius:6px;font-size:.9rem;margin-bottom:8px;outline:none}
  .edit-box input:focus{border-color:#ff6b8a}
  .canvas-wrap{position:relative;display:inline-block;border:2px solid #1e1e3a;border-radius:8px;overflow:hidden}
  canvas{display:block;max-width:100%;cursor:default}
  canvas.hoverable{cursor:pointer}
  .placeholder{text-align:center;margin-top:80px;color:#444}
  .placeholder svg{opacity:.3}
  .placeholder p{margin-top:14px;font-size:.95rem;color:#555}
  .progress-bar{width:100%;height:4px;background:#1a1a3a;border-radius:2px;overflow:hidden;display:none}
  .progress-fill{height:100%;background:#e94560;transition:width .3s;width:0%}
  .badge{display:inline-block;background:#e94560;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:10px;margin-left:5px;vertical-align:middle}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>✏️ Image Text Editor</h1>
    <p>Detect &amp; edit text in any image — PhoText style</p>
  </div>
</div>
<div class="container">
  <div class="sidebar">
    <div id="status" class="status"></div>

    <label class="upload-area" for="fileInput">
      <svg width="36" height="36" fill="none" stroke="#e94560" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4-4 4 4 4-6 4 6M4 20h16M4 4h16v12H4z"/></svg>
      <div style="color:#e94560;font-weight:600;margin-top:8px">Upload Image</div>
      <div style="color:#888;font-size:.78rem;margin-top:3px">PNG · JPG · WEBP</div>
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="btn" id="detectBtn" disabled>Detect Text</button>

    <div class="section-label" id="regionsLabel" style="display:none">
      Detected Regions <span class="badge" id="regionCount">0</span>
    </div>
    <div id="textList" style="display:flex;flex-direction:column;gap:6px"></div>

    <div class="edit-box" id="editBox">
      <h3>Edit Text</h3>
      <div style="color:#888;font-size:.78rem;margin-bottom:6px">
        Original: <strong id="origDisplay" style="color:#ccc"></strong>
      </div>
      <input type="text" id="newText" placeholder="Type replacement text...">
      <button class="btn" id="applyBtn">Apply</button>
      <button class="btn btn-outline" id="undoBtn" style="margin-top:6px">Undo</button>
    </div>

    <div id="downloadWrap" style="display:none">
      <div class="section-label">Export</div>
      <button class="btn btn-outline" id="downloadBtn">⬇ Download Image</button>
    </div>
  </div>

  <div class="main">
    <div id="canvasWrap" class="canvas-wrap" style="display:none">
      <canvas id="canvas"></canvas>
    </div>
    <div class="placeholder" id="placeholder">
      <svg width="72" height="72" fill="none" stroke="#555" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4-4 4 4 4-6 4 6M4 20h16M4 4h16v12H4z"/>
      </svg>
      <p>Upload an image to get started</p>
      <p style="margin-top:6px;font-size:.82rem;color:#444">Then click Detect Text to find editable regions</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let imgEl = null;
let originalDataURL = null;
let historyStack = [];   // stack of DataURLs for undo
let regions = [];
let selectedIdx = -1;
let scale = 1;

/* ─── helpers ─── */
function showStatus(msg, type='info'){
  const el=document.getElementById('status');
  el.innerHTML=msg; el.className='status '+type; el.style.display='block';
}
function hideStatus(){ document.getElementById('status').style.display='none'; }
function setProgress(p){
  const bar=document.getElementById('progressBar'), fill=document.getElementById('progressFill');
  if(p<=0){bar.style.display='none';return;}
  bar.style.display='block'; fill.style.width=p+'%';
}

/* ─── load image onto canvas ─── */
function loadImage(src, cb){
  const img=new Image();
  img.onload=()=>{
    imgEl=img;
    const maxW=document.querySelector('.main').clientWidth-40;
    const maxH=window.innerHeight-130;
    scale=Math.min(maxW/img.width, maxH/img.height, 1);
    canvas.width=img.width*scale;
    canvas.height=img.height*scale;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    document.getElementById('canvasWrap').style.display='inline-block';
    document.getElementById('placeholder').style.display='none';
    redraw();
    if(cb) cb();
  };
  img.src=src;
}

/* ─── redraw: image + subtle boxes only for unedited, selected highlight ─── */
function redraw(){
  if(!imgEl) return;
  ctx.drawImage(imgEl,0,0,canvas.width,canvas.height);
  regions.forEach((r,i)=>{
    if(r.edited) return;                            // edited → no box at all
    const {x,y,w,h}=r.bbox;
    const sx=x*scale, sy=y*scale, sw=w*scale, sh=h*scale;
    if(i===selectedIdx){
      // active selection: coloured fill + border
      ctx.fillStyle='rgba(233,69,96,0.18)';
      ctx.fillRect(sx,sy,sw,sh);
      ctx.strokeStyle='#e94560';
      ctx.lineWidth=2;
      ctx.strokeRect(sx,sy,sw,sh);
    } else {
      // unselected: faint dashed outline only
      ctx.setLineDash([3,3]);
      ctx.strokeStyle='rgba(74,144,217,0.5)';
      ctx.lineWidth=1;
      ctx.strokeRect(sx,sy,sw,sh);
      ctx.setLineDash([]);
    }
  });
  canvas.classList.toggle('hoverable', regions.some(r=>!r.edited));
}

/* ─── file upload ─── */
document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const fr=new FileReader();
  fr.onload=ev=>{
    originalDataURL=ev.target.result;
    historyStack=[];
    regions=[]; selectedIdx=-1;
    document.getElementById('textList').innerHTML='';
    document.getElementById('editBox').style.display='none';
    document.getElementById('regionsLabel').style.display='none';
    document.getElementById('downloadWrap').style.display='none';
    document.getElementById('detectBtn').disabled=false;
    hideStatus();
    loadImage(ev.target.result);
  };
  fr.readAsDataURL(file);
});

/* ─── detect text ─── */
document.getElementById('detectBtn').addEventListener('click', async function(){
  if(!imgEl) return;
  this.disabled=true;
  this.innerHTML='<span class="spinner"></span>Detecting...';
  showStatus('<span class="spinner"></span>Running OCR…','info');
  setProgress(10);
  try{
    const worker=await Tesseract.createWorker('eng',1,{
      logger:m=>{ if(m.status==='recognizing text') setProgress(10+m.progress*85); }
    });
    // run OCR on original full-res image for best accuracy
    const {data}=await worker.recognize(originalDataURL||canvas.toDataURL());
    await worker.terminate();
    setProgress(100);

    regions=[];
    data.words.forEach(word=>{
      if(word.confidence>30 && word.text.trim().length>0){
        // Tesseract coords are in original image space
        regions.push({
          text:word.text.trim(),
          confidence:word.confidence,
          edited:false,
          bbox:{
            x:Math.round(word.bbox.x0),
            y:Math.round(word.bbox.y0),
            w:Math.round(word.bbox.x1-word.bbox.x0),
            h:Math.round(word.bbox.y1-word.bbox.y0)
          }
        });
      }
    });

    renderList();
    document.getElementById('regionCount').textContent=regions.length;
    document.getElementById('regionsLabel').style.display=regions.length?'block':'none';
    document.getElementById('downloadWrap').style.display=regions.length?'block':'none';
    showStatus(`Found ${regions.length} text region(s)  — click one to edit`,'success');
    setProgress(0);
  }catch(e){
    showStatus('OCR failed: '+e.message,'error');
    setProgress(0);
  }
  this.disabled=false;
  this.textContent='Re-detect Text';
});

/* ─── sidebar list ─── */
function renderList(){
  const list=document.getElementById('textList');
  list.innerHTML='';
  regions.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='text-item'+(i===selectedIdx?' active':'')+(r.edited?' done':'');
    div.innerHTML=`<div class="label">Region ${i+1} · ${r.confidence.toFixed(0)}%${r.edited?' · edited':''}</div><div class="word">${r.text}</div>`;
    div.onclick=()=>selectRegion(i);
    list.appendChild(div);
  });
  redraw();
}

function selectRegion(i){
  selectedIdx=i;
  const r=regions[i];
  document.getElementById('origDisplay').textContent=r.text;
  document.getElementById('newText').value=r.edited?'':r.text;
  document.getElementById('editBox').style.display='block';
  renderList();
  document.getElementById('newText').select();
}

/* ─── canvas click → select region ─── */
canvas.addEventListener('click',function(e){
  if(!regions.length) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/scale;
  const my=(e.clientY-rect.top)/scale;
  for(let i=0;i<regions.length;i++){
    const {x,y,w,h}=regions[i].bbox;
    if(mx>=x&&mx<=x+w&&my>=y&&my<=y+h){ selectRegion(i); return; }
  }
  // click outside → deselect
  selectedIdx=-1;
  document.getElementById('editBox').style.display='none';
  redraw();
});

/* ─── background sampler: uses border OUTSIDE bbox for clean fill ─── */
function sampleBackground(imageData, canvasW, sx, sy, sw, sh){
  const pad=Math.max(4, Math.round(Math.min(sw,sh)*0.2));
  const x1=Math.max(0,sx-pad), y1=Math.max(0,sy-pad);
  const x2=Math.min(canvasW,sx+sw+pad);
  const stride=imageData.width;

  let rS=0,gS=0,bS=0,cnt=0;
  const addPx=(px,py)=>{
    const idx=(py*stride+px)*4;
    rS+=imageData.data[idx]; gS+=imageData.data[idx+1]; bS+=imageData.data[idx+2]; cnt++;
  };
  // top strip
  for(let py=y1;py<sy;py++) for(let px=x1;px<x2;px++) addPx(px,py);
  // bottom strip
  const by2=Math.min(imageData.height,sy+sh+pad);
  for(let py=sy+sh;py<by2;py++) for(let px=x1;px<x2;px++) addPx(px,py);
  // left strip (excluding corners already counted)
  for(let py=sy;py<sy+sh;py++) for(let px=x1;px<sx;px++) addPx(px,py);
  // right strip
  const rx2=Math.min(imageData.width,sx+sw+pad);
  for(let py=sy;py<sy+sh;py++) for(let px=sx+sw;px<rx2;px++) addPx(px,py);

  if(!cnt) return {r:255,g:255,b:255};
  return {r:Math.round(rS/cnt), g:Math.round(gS/cnt), b:Math.round(bS/cnt)};
}

/* ─── detect text color: pixels inside bbox most different from background ─── */
function detectTextColor(imageData, sx, sy, sw, sh, bg){
  const stride=imageData.width;
  let rS=0,gS=0,bS=0,cnt=0;
  for(let py=sy;py<sy+sh;py++){
    for(let px=sx;px<sx+sw;px++){
      const idx=(py*stride+px)*4;
      const dr=Math.abs(imageData.data[idx]-bg.r);
      const dg=Math.abs(imageData.data[idx+1]-bg.g);
      const db=Math.abs(imageData.data[idx+2]-bg.b);
      if(dr+dg+db>60){
        rS+=imageData.data[idx]; gS+=imageData.data[idx+1]; bS+=imageData.data[idx+2]; cnt++;
      }
    }
  }
  if(!cnt){
    const bright=(bg.r*299+bg.g*587+bg.b*114)/1000;
    return bright>128?{r:0,g:0,b:0}:{r:255,g:255,b:255};
  }
  return {r:Math.round(rS/cnt), g:Math.round(gS/cnt), b:Math.round(bS/cnt)};
}

/* ─── smart fill: row-by-row interpolation of left/right edge for gradient bg ─── */
function smartFill(sx, sy, sw, sh){
  // get full canvas pixels
  const full=ctx.getImageData(0,0,canvas.width,canvas.height);
  const stride=canvas.width;
  const sx2=sx+sw, sy2=sy+sh;

  // for each row in the region, sample leftmost and rightmost outside pixel
  for(let py=sy;py<sy2;py++){
    // left anchor
    const lx=Math.max(0,sx-1);
    const li=(py*stride+lx)*4;
    const lr=full.data[li], lg=full.data[li+1], lb=full.data[li+2];
    // right anchor
    const rx=Math.min(canvas.width-1,sx2);
    const ri=(py*stride+rx)*4;
    const rr=full.data[ri], rg=full.data[ri+1], rb=full.data[ri+2];

    for(let px=sx;px<sx2;px++){
      const t=(sw>1)?(px-sx)/(sw-1):0;
      const idx=(py*stride+px)*4;
      full.data[idx]  =Math.round(lr+(rr-lr)*t);
      full.data[idx+1]=Math.round(lg+(rg-lg)*t);
      full.data[idx+2]=Math.round(lb+(rb-lb)*t);
      full.data[idx+3]=255;
    }
  }
  ctx.putImageData(full,0,0);
}

/* ─── apply edit ─── */
document.getElementById('applyBtn').addEventListener('click',function(){
  if(selectedIdx<0) return;
  const newTxt=document.getElementById('newText').value;
  if(!newTxt.trim()) return;

  // save state for undo
  historyStack.push({dataURL:canvas.toDataURL(), regions:JSON.parse(JSON.stringify(regions))});

  const r=regions[selectedIdx];
  const {x,y,w,h}=r.bbox;
  const sx=Math.round(x*scale), sy=Math.round(y*scale);
  const sw=Math.round(w*scale), sh=Math.round(h*scale);

  // 1. grab pixel data BEFORE any changes
  const fullData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const bg=sampleBackground(fullData, canvas.width, sx, sy, sw, sh);
  const tc=detectTextColor(fullData, sx, sy, sw, sh, bg);

  // 2. smart fill (gradient interpolation) to erase original text
  smartFill(sx, sy, sw, sh);

  // 3. determine font size from original bbox height (Tesseract gives tight bbox)
  //    font-size ≈ bboxHeight in canvas pixels (bbox already includes ascenders/descenders)
  const fontSize=Math.max(8, sh * 0.88);

  // 4. draw new text
  ctx.save();
  ctx.textBaseline='middle';
  ctx.fillStyle=`rgb(${tc.r},${tc.g},${tc.b})`;

  // try bold first (same weight as most image text), then normal
  let fs=fontSize;
  ctx.font=`bold ${fs}px Arial`;
  while(ctx.measureText(newTxt).width > sw-2 && fs>6){
    fs-=0.5;
    ctx.font=`bold ${fs}px Arial`;
  }
  // if still overflows with bold try normal weight
  if(ctx.measureText(newTxt).width > sw-2){
    ctx.font=`${fs}px Arial`;
    while(ctx.measureText(newTxt).width > sw-2 && fs>6){
      fs-=0.5;
      ctx.font=`${fs}px Arial`;
    }
  }

  // left-align at region start, vertically centred
  ctx.fillText(newTxt, sx, sy+sh/2);
  ctx.restore();

  // 5. mark edited — bake canvas into imgEl so redraw keeps the edits
  regions[selectedIdx].edited=true;
  regions[selectedIdx].text=newTxt;

  const snap=canvas.toDataURL();
  const img=new Image();
  img.onload=()=>{
    imgEl=img;
    redraw();           // redraws from updated imgEl; edited region has no box
    renderList();
  };
  img.src=snap;

  document.getElementById('editBox').style.display='none';
  selectedIdx=-1;
  showStatus('Text updated!','success');
});

/* ─── undo ─── */
document.getElementById('undoBtn').addEventListener('click',function(){
  if(!historyStack.length) return;
  const prev=historyStack.pop();
  regions=prev.regions;
  selectedIdx=-1;
  document.getElementById('editBox').style.display='none';
  loadImage(prev.dataURL,()=>{ renderList(); showStatus('Undone','info'); });
});

/* ─── download ─── */
document.getElementById('downloadBtn').addEventListener('click',function(){
  // export without any overlays
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width; tmp.height=canvas.height;
  tmp.getContext('2d').drawImage(imgEl,0,0,tmp.width,tmp.height);
  const a=document.createElement('a');
  a.href=tmp.toDataURL('image/png');
  a.download='edited_image.png';
  a.click();
});

/* ─── enter key shortcut ─── */
document.getElementById('newText').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('applyBtn').click();
});
</script>
</body>
</html>
